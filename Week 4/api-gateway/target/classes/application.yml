server: { port: 9090 }
spring:
  main.web-application-type: reactive
  application: { name: api-gateway }
  cloud:
    gateway:
      discovery.locator: { enabled: true, lower-case-service-id: true }
      default-filters:
        - LocalResponseCache=30s,10MB
        - name: CircuitBreaker
          args: { name: gatewayCircuit, fallbackUri: forward:/fallback }
      routes:
        - id: greet-route
          uri: lb://greet-service
          predicates: [ Path=/greet-service/** ]
          filters: [ StripPrefix=1 ]
        - id: customer-route
          uri: lb://customer-service
          predicates: [ Path=/api/customers/** ]
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}
            - name: RequestRateLimiter
              args: { redis-rate-limiter.replenishRate: 5, redis-rate-limiter.burstCapacity: 10, key-resolver: '#{@ipKeyResolver}' }
        - id: billing-route
          uri: lb://billing-service
          predicates: [ Path=/api/bills/** ]
          filters: [ "RewritePath=/api/(?<segment>.*), /${segment}" ]
  data.redis: { host: localhost, port: 6379 }
eureka.client.service-url.defaultZone: http://localhost:8761/eureka
management.endpoints.web.exposure.include: health,info,gateway,metrics

server: { port: 8401 }
spring.application.name: payment-service
eureka.client.service-url.defaultZone: http://localhost:8761/eureka
management.endpoints.web.exposure.include: health,info,metrics,circuitbreakers
resilience4j:
  circuitbreaker.instances.paymentApi: { slidingWindowSize: 5, minimumNumberOfCalls: 3, failureRateThreshold: 50, waitDurationInOpenState: 10s }
  retry.instances.paymentApi: { maxAttempts: 2, waitDuration: 300ms }
